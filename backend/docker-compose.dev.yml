services:
  postgres:
    # pgvector 확장 포함 이미지(RDB + 벡터 검색 통합 — 별도 Qdrant 컨테이너 제거).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bizradar
      POSTGRES_USER: bizradar
      POSTGRES_PASSWORD: bizradar
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizradar -d bizradar"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Qdrant 제거: 벡터는 pgvector(postgres)로 통합. (복귀 시 이 블록 + volume 복원)

volumes:
  pg_data:
